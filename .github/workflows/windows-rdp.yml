name: "✨ Web-based VPS (Expose Tunnel) ✨"

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: "🧠 نصب پیش‌نیازها"
        run: |
          sudo apt update
          sudo apt install -y nodejs npm
          sudo npm install -g pm2

      - name: "🖥️ اجرای WeTTY (ترمینال تحت وب)"
        run: |
          pm2 start 'npx --yes wetty@2.5.0 --port 8080 --command /bin/bash' --name wetty
          pm2 save

      - name: "🚀 باز کردن تونل با Expose + localhost.run"
        uses: codetalkio/expose-tunnel@v1.5.0
        id: expose-tunnel
        with:
          service: localhost.run
          port: 8080

      - name: "🔗 نمایش لینک دسترسی"
        run: |
          echo "✅ لینک VPS ابری خودت (بدون نیاز به VPN):"
          echo "${{ steps.expose-tunnel.outputs.tunnel-url }}"
          echo "📌 لینک رو تو مرورگر باز کن. هر دستوری بزنی توی سرور گیت‌هاب اجرا میشه."
          echo "💡 اگه با وایفای باز نشد، از اینترنت موبایل (ایرانسل یا همراه اول) امتحان کن."
          sleep 6h

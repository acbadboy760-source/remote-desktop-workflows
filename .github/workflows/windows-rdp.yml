name: Run Simple Site

on:
  workflow_dispatch:

jobs:
  site:
    runs-on: ubuntu-latest
    steps:
      - name: Create index.html
        run: |
          cat > index.html << 'EOF'
          <!DOCTYPE html>
          <html>
          <head>
              <meta charset="UTF-8">
              <title>My Site</title>
              <style>
                  body {
                      background: #000;
                      display: flex;
                      justify-content: center;
                      align-items: center;
                      height: 100vh;
                      margin: 0;
                  }
                  h1 {
                      color: red;
                      font-size: 5rem;
                      font-family: Arial, sans-serif;
                  }
              </style>
          </head>
          <body>
              <h1>HI BRO</h1>
              <script>
                  console.log("Welcome to the site!");
              </script>
          </body>
          </html>
          EOF

      - name: Start Python HTTP server
        run: |
          python3 -m http.server 8080 &

      - name: Install and run Cloudflare Tunnel
        run: |
          curl -L -o cloudflared https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
          chmod +x cloudflared
          ./cloudflared tunnel --url http://localhost:8080 --logfile cf.log &
          sleep 15
          TUNNEL_URL=$(grep -o 'https://[a-z0-9.-]*\.trycloudflare\.com' cf.log | head -1)
          echo "========================================="
          echo "✅ سایت شما آماده است"
          echo "🔗 آدرس: ${TUNNEL_URL}"
          echo "📌 در کنسول مرورگر پیام خوش‌آمد می‌بینید"
          echo "⚠️ قبل از باز کردن، VPN را روشن کنید"
          echo "========================================="
          sleep 6h
